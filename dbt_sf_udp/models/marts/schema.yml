version: 2

models:
  - name: mart_neighborhood_equity
    description: Unified monthly neighborhood-level table for construction activity, 311 complaints, and response equity.
    columns:
      - name: neighborhood
        tests:
          - not_null
      - name: month
        tests:
          - not_null
      - name: total_311_requests
        tests:
          - assert_column_gte:
              arguments:
                min_value: 0
      - name: avg_days_to_close
        tests:
          - assert_column_gte:
              arguments:
                min_value: 0
          - assert_average_gt:
              arguments:
                min_value: 0
      - name: total_permits
        tests:
          - assert_column_gte:
              arguments:
                min_value: 0
      - name: construction_to_complaint_ratio
        tests:
          - assert_column_gte:
              arguments:
                min_value: 0
